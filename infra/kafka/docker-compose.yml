services:

  # =========================
  # BROKER / CONTROLLER 1
  # =========================
  kafka-1:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-1
    
    command: >
      bash -c "
      if [ ! -f /var/lib/kafka/data/meta.properties ]; then
        echo 'Formateando almacenamiento de kafka-1...';
        kafka-storage format -t CqdSQInQSU-vGH2wdDvRdA -c /etc/kafka/docker/server.properties;
      fi;
      /etc/confluent/docker/run
      "
    
    ports:
      - "9092:9092"

    environment:
      CLUSTER_ID: "CqdSQInQSU-vGH2wdDvRdA"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9091,2@kafka-2:9091,3@kafka-3:9091
      KAFKA_LISTENERS: PLAINTEXT://:9090,CONTROLLER://:9091,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9090,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - ./volumes/kafka-1-data:/var/lib/kafka/data

    networks:
      - kafka-net


  # =========================
  # BROKER / CONTROLLER 2
  # =========================
